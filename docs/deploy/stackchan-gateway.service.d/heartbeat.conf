# Phase D1 + E: heartbeat の opt-in（yorishiro fork 専用）
# D1: 低頻度・無音の仕草（見回し・表情・うなずき）で「生きてる感」を出す。
# E:  通知型発話 — 沈黙がデフォルト、価値がある情報（天気・メモ）があるときだけ一言。
# このファイルを外せば heartbeat は完全に無効（デフォルト挙動）に戻る。
# install: sudo cp <this file> /etc/systemd/system/stackchan-gateway.service.d/
#          sudo systemctl daemon-reload && sudo systemctl restart stackchan-gateway
[Service]
# 平均間隔（分）。±25% のジッター付き。検証時は 1 に下げると約1分間隔になる
Environment=STACKCHAN_HEARTBEAT_INTERVAL_MIN=30
# 任意（デフォルト値あり）:
# クワイエットアワー（ローカル時刻、跨ぎ可）。デフォルト 22:00-06:30。"off" で無効
#Environment=STACKCHAN_HEARTBEAT_QUIET=22:00-06:30
# 間隔ジッター 0..0.9（デフォルト 0.25）
#Environment=STACKCHAN_HEARTBEAT_JITTER=0.25
# ランダム仕草を止める場合は 0（発話通知だけ残せる）
#Environment=STACKCHAN_HEARTBEAT_GESTURES=1

# --- Phase E: 通知型発話（マスタースイッチ。未設定なら以下すべて無効） ---
#Environment=STACKCHAN_HEARTBEAT_SPEAK=1
# 直近のユーザー対話（音声・タッチ）からの沈黙時間（分）。デフォルト 20
#Environment=STACKCHAN_HEARTBEAT_SPEAK_COOLDOWN_MIN=20
# 1日の発話回数上限（安全弁）。デフォルト 3
#Environment=STACKCHAN_HEARTBEAT_SPEAK_MAX_PER_DAY=3
# 天気情報源: 気象庁コード（大阪府 office / 守口市 class20）。両方必須
#Environment=STACKCHAN_WEATHER_AREA=270000
#Environment=STACKCHAN_WEATHER_CITY=2720900
# 降水確率の発話閾値 %（デフォルト 50）と朝のチェックウィンドウ
#Environment=STACKCHAN_WEATHER_POP_THRESHOLD=50
#Environment=STACKCHAN_WEATHER_WINDOW=06:30-09:30
# 夕方のメモリマインドウィンドウ
#Environment=STACKCHAN_MEMO_WINDOW=18:00-21:00
# 発話済み管理の state ファイル（デフォルト ~/.stackchan/heartbeat_state.json）
#Environment=STACKCHAN_HEARTBEAT_STATE=
