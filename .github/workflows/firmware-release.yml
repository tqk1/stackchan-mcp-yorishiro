name: Firmware Release

# Triggers:
# - push:    tag `firmware-v*` → build + publish a GitHub Release with the
#            firmware binaries attached as assets.
# - manual:  workflow_dispatch → build-only smoke test (no publish). Useful
#            for verifying the workflow itself or any change to it before
#            cutting a real tag.
on:
  push:
    tags:
      - "firmware-v*"
  workflow_dispatch:

# Default permissions: nothing. Each job opts in to what it needs. The
# release job is the only one that requires `contents: write`.
permissions: {}

# Only one run at a time per ref. Tag pushes never collide with each
# other, but workflow_dispatch on the same branch can.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Verify CHANGELOG.md has a dated section for the firmware tag
        # Re-publish gate that closes the documentation debt that the
        # CHANGELOG `[Unreleased]` Firmware section accumulated under
        # firmware-v1.4.1 / v1.5.0 / v1.6.0 / v1.7.0 — each of those
        # releases shipped binaries to GitHub Releases without ever
        # promoting the matching `[Unreleased]` entries into a dated
        # CHANGELOG section, so the in-repo CHANGELOG diverged from the
        # artifact-of-record. From firmware-v1.8.0 onward, this step
        # refuses to build the release if CHANGELOG.md does not yet
        # contain a `## [firmware-vX.Y.Z] - YYYY-MM-DD` line matching
        # the tag being pushed. Promote the entries belonging to the new
        # tag in a prep PR, merge it, then push the tag at the merged
        # commit. See `CONTRIBUTING.md` `Releasing the firmware`.
        #
        # workflow_dispatch dry-runs skip this gate because there is no
        # tag to validate; those runs are intended for smoke-testing the
        # build pipeline from any branch.
        if: github.event_name == 'push'
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" != refs/tags/firmware-v* ]]; then
            echo "::error::Firmware release tags must start with 'firmware-v' (got: $GITHUB_REF)"
            exit 1
          fi
          TAG="${GITHUB_REF#refs/tags/}"

          # Escape regex metacharacters in TAG so the version dots in
          # tags like `firmware-v1.8.0` are matched literally rather
          # than as ERE wildcards. Without this, a typo section header
          # like `## [firmware-v1x8x0] - 2026-05-20` would falsely
          # satisfy the gate for the tag `firmware-v1.8.0` (any single
          # character at the dot positions would match).
          TAG_ESC="${TAG//./\\.}"

          # Count exact-match dated sections. Requires line layout
          # `## [<TAG>] - YYYY-MM-DD` with no leading or trailing
          # content. Uses `-c` so we can also fail on duplicates;
          # `-q` would only check existence and would let a file with
          # two matching sections pass, which leaves release-notes
          # extraction ambiguous.
          COUNT=$(grep -cE "^## \[${TAG_ESC}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md || true)

          if [ "$COUNT" -eq 0 ]; then
            echo "::error::CHANGELOG.md is missing a dated section for ${TAG}."
            echo ""
            echo "Expected to find exactly one line matching:"
            echo "    ## [${TAG}] - YYYY-MM-DD"
            echo ""
            echo "Promote the entries that belong to ${TAG} from [Unreleased] into a"
            echo "dated section, update the comparison-links block at the bottom of"
            echo "CHANGELOG.md, open a PR, merge it, and re-push the tag at the merged"
            echo "commit. See CONTRIBUTING.md 'Releasing the firmware'."
            exit 1
          fi

          if [ "$COUNT" -gt 1 ]; then
            echo "::error::CHANGELOG.md has ${COUNT} dated sections for ${TAG}, expected exactly 1."
            echo ""
            echo "Multiple dated sections for the same tag make the release-notes"
            echo "extraction step (sed -n '/^## \[${TAG}\]/,/^## \[/p') ambiguous and"
            echo "indicate either a copy-paste mistake during the release-prep PR or a"
            echo "merge conflict that was resolved by keeping both sides. Collapse the"
            echo "duplicates into a single section, open a PR, merge it, and re-push"
            echo "the tag at the merged commit."
            exit 1
          fi

          echo "CHANGELOG entry for ${TAG} verified (exactly 1 dated section)."

      - name: Build firmware with ESP-IDF Docker image
        # Same build command the regular CI Build workflow uses, so a
        # tag-driven release artifact is byte-identical to what the PR
        # checks already validate.
        working-directory: firmware
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD":/project \
            -w /project \
            espressif/idf:v5.5.2 \
            python ./scripts/release.py stackchan

      - name: Verify firmware artifacts
        # `merged-binary.bin` is the clean-install image (write at 0x0,
        # resets NVS). `xiaozhi.bin` is the app-only image produced by
        # `idf.py build` (write at 0x20000, preserves NVS / Wi-Fi). Both
        # ship as release assets so end users and existing-device users
        # can pick the right path. The zip is a convenience archive of
        # `merged-binary.bin` named after the project version.
        run: |
          set -euo pipefail
          test -f firmware/build/merged-binary.bin
          test -f firmware/build/xiaozhi.bin
          ls firmware/releases/v*_stackchan.zip

      - name: Upload firmware artifacts
        # Uploaded for both tag-push and workflow_dispatch so a manual
        # run can still be inspected end-to-end. The release job below
        # is the only step gated on the tag-push event.
        uses: actions/upload-artifact@v4
        with:
          name: stackchan-firmware-${{ github.sha }}
          retention-days: 14
          path: |
            firmware/build/merged-binary.bin
            firmware/build/xiaozhi.bin
            firmware/releases/v*_stackchan.zip

  release:
    name: Publish GitHub Release
    needs: build
    # Tag-only publish. workflow_dispatch invocations stop at the build
    # job above, so manual runs cannot accidentally release. The
    # `startsWith(...)` guard makes the intent explicit and survives
    # future trigger additions.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/firmware-v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: stackchan-firmware-${{ github.sha }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          # `actions/upload-artifact@v4` preserves the common-ancestor
          # directory layout (here: `firmware/`), so the downloaded
          # artifact under `dist/` keeps the `build/` and `releases/`
          # subdirectories from the build job.
          files: |
            dist/build/merged-binary.bin
            dist/build/xiaozhi.bin
            dist/releases/v*_stackchan.zip
          body: |
            Pre-built firmware binaries for the M5Stack StackChan kit.
            Flash with `esptool.py` — no ESP-IDF / Docker setup needed.

            ### Quick flash (clean install — resets NVS / Wi-Fi config)

            ```bash
            # Replace --port with your platform's serial device:
            #   macOS:   /dev/cu.usbmodem* (e.g. /dev/cu.usbmodem1101)
            #   Linux:   /dev/ttyUSB0 or /dev/ttyACM0
            #   Windows: COM3 (or whichever it shows up as in Device Manager)
            esptool.py --chip esp32s3 --port /dev/cu.usbmodem1101 -b 460800 \
              write_flash 0x0 merged-binary.bin
            ```

            ### App-only update (preserves NVS — keeps your Wi-Fi setup)

            ```bash
            # Replace --port with your platform's serial device:
            #   macOS:   /dev/cu.usbmodem* (e.g. /dev/cu.usbmodem1101)
            #   Linux:   /dev/ttyUSB0 or /dev/ttyACM0
            #   Windows: COM3 (or whichever it shows up as in Device Manager)
            esptool.py --chip esp32s3 --port /dev/cu.usbmodem1101 -b 460800 \
              write_flash 0x20000 xiaozhi.bin
            ```

            See [README.md](https://github.com/kisaragi-mochi/stackchan-mcp/blob/main/README.md) / [README.ja.md](https://github.com/kisaragi-mochi/stackchan-mcp/blob/main/README.ja.md) for the full setup guide.
